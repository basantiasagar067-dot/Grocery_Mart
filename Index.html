<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshMart - Online Grocery Store</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

  <!-- NAVBAR -->
  <header class="sticky top-0 z-40 bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
      
      <div class="flex items-center gap-2 cursor-pointer" onclick="filterCategory('All')">
        <div class="bg-emerald-600 text-white p-2 rounded-xl">
          <i data-lucide="shopping-basket" class="w-6 h-6"></i>
        </div>
        <span class="text-xl font-bold text-emerald-600">FreshMart</span>
      </div>

      <div class="flex-1 max-w-md relative hidden md:block">
        <i data-lucide="search" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search items..." 
          oninput="handleSearch()"
          class="w-full pl-10 pr-4 py-2 bg-gray-100 rounded-full text-sm border focus:bg-white focus:outline-none"
        />
      </div>

      <div class="flex items-center gap-3">
        <a href="login.html" class="text-sm font-semibold text-gray-600 hover:text-emerald-600 px-3 py-2">
          Login
        </a>
        <button 
          onclick="toggleCart(true)" 
          class="relative flex items-center gap-2 bg-emerald-50 text-emerald-700 px-4 py-2 rounded-full font-medium"
        >
          <i data-lucide="shopping-cart" class="w-5 h-5"></i>
          <span id="cartBadge" class="bg-emerald-600 text-white text-xs font-bold px-2 py-0.5 rounded-full">0</span>
        </button>
      </div>

    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="max-w-7xl mx-auto px-4 py-8 flex-1">
    
    <!-- Category Pills -->
    <div class="flex items-center gap-2 overflow-x-auto pb-4 mb-6" id="categoryContainer"></div>

    <!-- Product Grid -->
    <div id="productGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>

  </main>

  <!-- CART DRAWER -->
  <div id="cartDrawer" class="fixed inset-0 z-50 invisible transition-all">
    <div onclick="toggleCart(false)" class="absolute inset-0 bg-black/40"></div>

    <div id="drawerContainer" class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white shadow-2xl flex flex-col transform translate-x-full transition-transform">
      <div class="p-4 border-b flex items-center justify-between">
        <h3 class="font-bold text-lg">Your Cart</h3>
        <button onclick="toggleCart(false)"><i data-lucide="x" class="w-6 h-6"></i></button>
      </div>

      <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

      <div class="p-4 border-t bg-gray-50 space-y-3">
        <div class="flex justify-between font-bold text-lg">
          <span>Total:</span>
          <span id="totalAmount" class="text-emerald-600">$0.00</span>
        </div>
        <button onclick="openCheckout()" id="checkoutBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">
          Checkout
        </button>
      </div>
    </div>
  </div>

  <script>
    const products = [
      { id: 1, name: "Organic Red Apples", category: "Fruits", price: 2.99, unit: "1 kg", image: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=300" },
      { id: 2, name: "Fresh Whole Milk", category: "Dairy", price: 1.49, unit: "1 Liter", image: "https://images.unsplash.com/photo-1563636619-e9143da7973b?w=300" },
      { id: 3, name: "Whole Wheat Bread", category: "Bakery", price: 2.10, unit: "400g Pack", image: "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=300" },
      { id: 4, name: "Farm Crisp Carrots", category: "Vegetables", price: 1.20, unit: "500g", image: "https://images.unsplash.com/photo-1598170845058-12ef4a457939?w=300" }
    ];

    const categories = ["All", "Fruits", "Vegetables", "Dairy", "Bakery"];
    let cart = [];
    let selectedCategory = "All";

    document.addEventListener("DOMContentLoaded", () => {
      renderCategories();
      renderProducts();
      lucide.createIcons();
    });

    function renderCategories() {
      document.getElementById("categoryContainer").innerHTML = categories.map(cat => `
        <button onclick="filterCategory('${cat}')" class="px-4 py-2 rounded-full text-sm ${selectedCategory === cat ? 'bg-emerald-600 text-white' : 'bg-white border text-gray-600'}">
          ${cat}
        </button>
      `).join('');
    }

    function filterCategory(cat) {
      selectedCategory = cat;
      renderCategories();
      renderProducts();
    }

    function renderProducts() {
      const filtered = products.filter(p => selectedCategory === "All" || p.category === selectedCategory);
      document.getElementById("productGrid").innerHTML = filtered.map(p => `
        <div class="bg-white rounded-2xl p-3 border shadow-sm flex flex-col justify-between">
          <div>
            <img src="${p.image}" class="w-full h-32 object-cover rounded-xl mb-2">
            <h3 class="font-bold text-sm">${p.name}</h3>
            <p class="text-xs text-gray-400">${p.unit}</p>
          </div>
          <div class="flex items-center justify-between mt-3">
            <span class="font-bold text-emerald-600">$${p.price.toFixed(2)}</span>
            <button onclick="addToCart(${p.id})" class="bg-emerald-600 text-white p-2 rounded-xl">
              <i data-lucide="plus" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function addToCart(id) {
      const p = products.find(i => i.id === id);
      const existing = cart.find(i => i.id === id);
      if (existing) existing.qty += 1;
      else cart.push({ ...p, qty: 1 });
      updateCartUI();
    }

    function updateCartUI() {
      document.getElementById("cartBadge").innerText = cart.reduce((s, i) => s + i.qty, 0);
      const itemsContainer = document.getElementById("cartItems");
      
      itemsContainer.innerHTML = cart.map(item => `
        <div class="flex justify-between items-center border-b pb-2">
          <div>
            <h4 class="font-bold text-sm">${item.name}</h4>
            <p class="text-xs text-gray-400">$${item.price} x ${item.qty}</p>
          </div>
          <span class="font-bold text-sm">$${(item.price * item.qty).toFixed(2)}</span>
        </div>
      `).join('');

      const total = cart.reduce((s, item) => s + (item.price * item.qty), 0);
      document.getElementById("totalAmount").innerText = `$${total.toFixed(2)}`;
    }

    function toggleCart(open) {
      const drawer = document.getElementById("cartDrawer");
      const container = document.getElementById("drawerContainer");
      if (open) {
        drawer.classList.remove("invisible");
        setTimeout(() => container.classList.remove("translate-x-full"), 10);
      } else {
        container.classList.add("translate-x-full");
        setTimeout(() => drawer.classList.add("invisible"), 300);
      }
    }
  </script>
</body>
</html>
