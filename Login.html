<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshMart - Login & Register</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-emerald-50 min-h-screen flex items-center justify-center p-4 font-sans">

  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border">
    
    <!-- Header -->
    <div class="bg-emerald-600 p-6 text-center text-white">
      <h1 class="text-2xl font-bold">FreshMart</h1>
      <p class="text-emerald-100 text-xs">Login or create an account to start shopping</p>
    </div>

    <!-- Toggle Buttons -->
    <div class="p-6">
      <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
        <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-emerald-700 shadow-sm">
          Log In
        </button>
        <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500">
          Sign Up
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleAuth(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Email</label>
          <input type="email" required placeholder="user@example.com" class="w-full px-4 py-2 border rounded-xl text-sm focus:outline-emerald-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Password</label>
          <input type="password" required placeholder="••••••••" class="w-full px-4 py-2 border rounded-xl text-sm focus:outline-emerald-500">
        </div>
        <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">
          Sign In
        </button>
      </form>

      <!-- Signup Form -->
      <form id="registerForm" onsubmit="handleAuth(event)" class="space-y-4 hidden">
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Full Name</label>
          <input type="text" required placeholder="John Doe" class="w-full px-4 py-2 border rounded-xl text-sm focus:outline-emerald-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Email</label>
          <input type="email" required placeholder="user@example.com" class="w-full px-4 py-2 border rounded-xl text-sm focus:outline-emerald-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Password</label>
          <input type="password" required placeholder="At least 6 characters" class="w-full px-4 py-2 border rounded-xl text-sm focus:outline-emerald-500">
        </div>
        <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">
          Create Account
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="index.html" class="text-xs font-semibold text-gray-500 hover:text-emerald-600">
          ← Back to FreshMart Store
        </a>
      </div>
    </div>

  </div>

  <script>
    function switchTab(mode) {
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");
      const tabLogin = document.getElementById("tabLogin");
      const tabRegister = document.getElementById("tabRegister");

      if (mode === 'login') {
        loginForm.classList.remove("hidden");
        registerForm.classList.add("hidden");
        tabLogin.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-emerald-700 shadow-sm";
        tabRegister.className = "flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500";
      } else {
        loginForm.classList.add("hidden");
        registerForm.classList.remove("hidden");
        tabRegister.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-white text-emerald-700 shadow-sm";
        tabLogin.className = "flex-1 py-2 text-sm font-semibold rounded-lg text-gray-500";
      }
    }

    function handleAuth(e) {
      e.preventDefault();
      alert("Success! Redirecting to shop...");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
